<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rahul Kumar</title>

<style>
:root{
  --bg:#fff6c9;
  --text:#000;
  --card:#ffffffcc;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

/* ================= PROFILE ================= */
#profile{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  background:linear-gradient(120deg,#0f2027,#203a43,#2c5364,#6a11cb,#2575fc);
  background-size:400% 400%;
  animation:grad 12s ease infinite;
}
@keyframes grad{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
           width:90%;
           max-width:320px; 
           text-align:center;
            }
.glow{
  border:2px solid #00ffff;
  box-shadow:0 0 10px #00ffff,0 0 20px #00ffff;
  padding:12px;margin:12px 0;border-radius:8px;
  cursor:pointer;transition:.3s;
}
.glow:hover{transform:scale(1.05)}
.photo{
  width:120px;height:120px;border-radius:50%;
  margin:0 auto 18px;border:2px dashed #00ffff;
  box-shadow:0 0 15px #00ffff;overflow:hidden;
}
.photo img{width:100%;height:100%;object-fit:cover}
hr{border:none;height:1px;background:#00ffff;margin:12px 0}

/* ================= COMMON ================= */
.page{display:none;min-height:100vh}
.btn{
  padding:10px 22px;
  border-radius:30px;
  border:2px solid #000;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(45deg,#74ffae,#2cfff4);
}

/* ================= DIARY MAIN ================= */
#diary{background:var(--bg);color:var(--text)}
header{padding:15px 25px}
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
}
.name{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:22px;
  font-weight:800;
  background:linear-gradient(45deg,#ff00cc,#3333ff,#00ffee);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.theme-btn{background:linear-gradient(45deg,#ff9a9e,#fad0c4)}
.theme-box{
  position:absolute;
  top:60px;
  right:0;
  background:var(--card);
  padding:12px;
  border-radius:10px;
  display:none;
  flex-direction:column;
  gap:8px;
}

/* ===== buttons layout ===== */
.btn-row{
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
}

.sub{
  display:none;
  padding:10px 25px;
}
.sub.left{text-align:left}
.sub.right{text-align:right}
.sub button{margin:6px}

/* ================= DIARY PAGE ================= */
.bigbox{
  max-width:900px;
  margin:30px auto;
  padding:40px;
  min-height:70vh;
  background:linear-gradient(135deg,#ffffff,#f3f3f3);
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
  font-size:18px;
  line-height:1.7;
}
.diary-header{padding:15px 25px}
</style>
</head>

<script>
const themeBox = document.getElementById('themeBox');

function show(id){
  document.querySelectorAll('.page,#profile')
    .forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='block';
}

function toggleDiary(type){
  const real=document.getElementById('real');
  const love=document.getElementById('love');
  if(type==='real'){
    real.style.display=real.style.display==='block'?'none':'block';
    love.style.display='none';
  }else{
    love.style.display=love.style.display==='block'?'none':'block';
    real.style.display='none';
  }
}

function toggleTheme(){
  themeBox.style.display =
    themeBox.style.display === 'flex' ? 'none' : 'flex';
}

function setBg(c){
  document.documentElement.style.setProperty('--bg',c);
}
function setText(c){
  document.documentElement.style.setProperty('--text',c);
}

show('profile');
</script>
